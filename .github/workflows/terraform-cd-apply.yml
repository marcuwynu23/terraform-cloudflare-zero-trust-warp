name: CD - Cloudflare Zero Trust WARP (Apply)

on:
  workflow_dispatch:
    inputs:

      project_id:
        description: GCP project ID
        required: true
        type: string

      region:
        description: "GCP region (Free Tier: us-west1, us-central1, us-east1)"
        required: true
        type: string
        default: us-central1

      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true
        type: string

      github_client_id:
        description: github client id
        required: true
        type: string

      zero_trust_org_name:
        description: zero trust org name
        required: true
        type: string

      zero_trust_auth_domain:
        description: zero trust auth domain
        required: true
        type: string

      zero_trust_is_ui_read_only:
        description: zero trust is ui read only
        required: true
        type: string

      github_idp_name:
        description: github idp name
        required: true
        type: string

      warp_enrollment_policy_name:
        description: warp enrollment policy name
        required: true
        type: string

      warp_enrollment_policy_decision:
        description: warp enrollment policy decision
        required: true
        type: string

      warp_enrollment_policy_include_emails:
        description: warp enrollment policy include emails
        required: true
        type: string

      warp_enrollment_policy_purpose_justification_required:
        description: warp enrollment policy purpose justification required
        required: true
        type: string

env:
  TF_BUCKET_NAME: ${{ secrets.TF_BUCKET_NAME }}
  TF_BUCKET_PREFIX: ${{ secrets.TF_BUCKET_PREFIX }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_github_client_secret: ${{ secrets.GITHUB_CLIENT_SECRET }}
jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    - name: Ensure GCS State Bucket Exists
      run: |
        gcloud storage buckets describe gs://$TF_BUCKET_NAME --format="json" 2>/dev/null || \
        gcloud storage buckets create gs://$TF_BUCKET_NAME \
          --location=${{ github.event.inputs.region }} \
          --uniform-bucket-level-access
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=$TF_BUCKET_NAME" \
          -backend-config="prefix=$TF_BUCKET_PREFIX"
    - name: Terraform Plan
      run: |
        terraform plan  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="cloudflare_account_id=${{ github.event.inputs.cloudflare_account_id }}" \
          -var="github_client_id=${{ github.event.inputs.github_client_id }}" \
          -var="zero_trust_org_name=${{ github.event.inputs.zero_trust_org_name }}" \
          -var="zero_trust_auth_domain=${{ github.event.inputs.zero_trust_auth_domain }}" \
          -var="zero_trust_is_ui_read_only=${{ github.event.inputs.zero_trust_is_ui_read_only }}" \
          -var="github_idp_name=${{ github.event.inputs.github_idp_name }}" \
          -var="warp_enrollment_policy_name=${{ github.event.inputs.warp_enrollment_policy_name }}" \
          -var="warp_enrollment_policy_decision=${{ github.event.inputs.warp_enrollment_policy_decision }}" \
          -var="warp_enrollment_policy_include_emails=${{ github.event.inputs.warp_enrollment_policy_include_emails }}" \
          -var="warp_enrollment_policy_purpose_justification_required=${{ github.event.inputs.warp_enrollment_policy_purpose_justification_required }}"
    - name: Terraform Apply
      run: |
        terraform apply -auto-approve  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="cloudflare_account_id=${{ github.event.inputs.cloudflare_account_id }}" \
          -var="github_client_id=${{ github.event.inputs.github_client_id }}" \
          -var="zero_trust_org_name=${{ github.event.inputs.zero_trust_org_name }}" \
          -var="zero_trust_auth_domain=${{ github.event.inputs.zero_trust_auth_domain }}" \
          -var="zero_trust_is_ui_read_only=${{ github.event.inputs.zero_trust_is_ui_read_only }}" \
          -var="github_idp_name=${{ github.event.inputs.github_idp_name }}" \
          -var="warp_enrollment_policy_name=${{ github.event.inputs.warp_enrollment_policy_name }}" \
          -var="warp_enrollment_policy_decision=${{ github.event.inputs.warp_enrollment_policy_decision }}" \
          -var="warp_enrollment_policy_include_emails=${{ github.event.inputs.warp_enrollment_policy_include_emails }}" \
          -var="warp_enrollment_policy_purpose_justification_required=${{ github.event.inputs.warp_enrollment_policy_purpose_justification_required }}"
